server:
  port: 8082

spring:
  application:
    name: trip-service
  datasource:
    url: jdbc:postgresql://localhost:5432/viajes_trips
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.viajes.trips: DEBUG